<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>OFFDOTS — Creative Studio | Brand Identity, Web Design & Motion</title>
    <meta name="description" content="Offdots is a full-service creative studio specialising in brand identity, web design, motion design and digital strategy. We build bold brands for companies that refuse to blend in." />
    <meta name="keywords" content="creative agency, brand identity, web design, motion design, digital strategy, UI UX design, creative studio, branding agency" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Offdots Studio" />
    <link rel="canonical" href="https://offdots.io/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://offdots.io/" />
    <meta property="og:title"       content="OFFDOTS — Creative Studio | Brand Identity, Web Design & Motion" />
    <meta property="og:description" content="A full-service creative studio building bold brands and digital products for companies that refuse to blend in." />
    <meta property="og:image"       content="https://offdots.io/og-image.jpg" />
    <meta property="og:site_name"   content="Offdots Studio" />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@offdots" />
    <meta name="twitter:title"       content="OFFDOTS — Creative Studio" />
    <meta name="twitter:description" content="A full-service creative studio building bold brands and digital products for companies that refuse to blend in." />
    <meta name="twitter:image"       content="https://offdots.io/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Offdots Studio",
      "alternateName": "OFFDOTS",
      "description": "A full-service creative studio specialising in brand identity, web design, motion design and digital strategy for ambitious companies.",
      "url": "https://offdots.io",
      "email": "hello@offdots.io",
      "foundingDate": "2017",
      "numberOfEmployees": { "@type": "QuantitativeValue", "minValue": 5, "maxValue": 15 },
      "areaServed": "Worldwide",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Creative Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Brand Identity & Strategy" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Web Design & Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Motion Design & Animation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Creative Direction & Strategy" } }
        ]
      },
      "award": ["Awwwards Nominee", "CSS Design Awards", "FWA Featured"],
      "sameAs": [
        "https://instagram.com/offdots",
        "https://twitter.com/offdots",
        "https://linkedin.com/company/offdots"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
